version: "3.9"

networks:
  coremesh-net:
    driver: bridge

volumes:
  postgres-data:
  redis-data:
  qdrant-data:

services:
  # -------------------------------------------------------------------------
  # PostgreSQL 16 — transaction metadata: prompt states, experiments, logs
  # -------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: coremesh-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: coremesh
      POSTGRES_PASSWORD: coremesh_secret
      POSTGRES_DB: coremesh
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - coremesh-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U coremesh -d coremesh"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # -------------------------------------------------------------------------
  # Redis 7.2 — token buckets, semantic embedding cache (HNSW via RedisStack)
  # -------------------------------------------------------------------------
  redis:
    image: redis/redis-stack:7.2.0-v12
    container_name: coremesh-redis
    restart: unless-stopped
    command: >
      redis-stack-server
      --appendonly yes
      --appendfsync everysec
      --protected-mode no
    ports:
      - "127.0.0.1:6379:6379"   # Redis
      - "127.0.0.1:8001:8001"   # RedisInsight UI
    volumes:
      - redis-data:/data
    networks:
      - coremesh-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # -------------------------------------------------------------------------
  # Qdrant — enterprise document index: sparse/dense spatial indices
  # -------------------------------------------------------------------------
  qdrant:
    image: qdrant/qdrant:latest
    container_name: coremesh-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # HTTP REST API
      - "6334:6334"   # gRPC API
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - coremesh-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:6333/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s
